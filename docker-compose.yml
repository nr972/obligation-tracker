services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/obligations.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORS_ORIGINS=["http://localhost:8501"]
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  frontend:
    build: .
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    command: ["streamlit", "run", "ot_frontend/app.py", "--server.port", "8501", "--server.headless", "true", "--server.address", "0.0.0.0"]
    depends_on:
      - api
    restart: unless-stopped

volumes:
  app-data:
